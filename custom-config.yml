# ------------------------------
# Verdaccio Caching Proxy Config
# ------------------------------

storage: /verdaccio/storage


store:
  aws-s3-storage:
    bucket: R2_BUCKET
    endpoint: R2_ENDPOINT
    region: auto
    accessKeyId: S3_ACCESS_KEY_ID
    secretAccessKey: S3_SECRET_ACCESS_KEY
    s3ForcePathStyle: true

web:
  title: Verdaccio Cache Proxy

auth:
  htpasswd:
    file: /verdaccio/conf/htpasswd
    max_users: 0

uplinks:
  npmjs:
    url: https://registry.npmjs.org/

packages:
  '**':
    access: $all
    publish: $none
    unpublish: $none
    proxy: npmjs
    storage: aws-s3-storage

log:
  type: stdout
  format: pretty
  level: http

listen: 0.0.0.0:4873

middlewares:
  audit:
    enabled: true